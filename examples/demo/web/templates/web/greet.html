{{ define "title" }}Set greeting{{ end }}

{{ define "content" }}
  {{ template "_nav.html" . }}
  <h1>Set greeting</h1>
  <form method="post" action="/greet">
    <label>Name <input name="name" value="{{ .Form.Value "name" }}"></label>
    {{ with .Form.Error "name" }}<span class="error">{{ . }}</span>{{ end }}
    <button type="submit">Save</button>
  </form>
{{ end }}
