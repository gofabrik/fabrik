# Demo configuration. Environment overrides: DEMO_HTTP_ADDR,
# DEMO_LOG_LEVEL, DEMO_GREETER_KIND, DEMO_DATABASE_PATH,
# DEMO_CROSSORIGIN_TRUSTED_ORIGINS, DEMO_MAILER_*, and DEMO_STORAGE_PATH.
http:
  addr: ":8080"
greeter:
  kind: goodbye

mailer:
  kind: log
  from: notifier@demo.example
  to: greetings@demo.example

database:
  path: demo.db

crossorigin:
  trusted_origins: []

storage:
  path: storage
