# Demo configuration. Environment overrides: DEMO_HTTP_ADDR,
# DEMO_LOG_LEVEL, DEMO_GREETER_KIND, DEMO_DATABASE_PATH,
# DEMO_CROSSORIGIN_TRUSTED_ORIGINS, DEMO_MAILER_*, and DEMO_RATELIMIT_*.
http:
  addr: ":8080"
log:
  level: info
greeter:
  kind: goodbye

mailer:
  kind: log
  from: notifier@demo.example
  to: greetings@demo.example

database:
  path: demo.db

crossorigin:
  trusted_origins: []

ratelimit:
  rate: 60
  period: 1m
  burst: 12
