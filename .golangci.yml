version: "2"

# Exclude revive's exported-comment rule because it overwhelms the report with low-value findings.
linters:
  default: standard
  enable:
    - gosec
    - gocritic
    - revive
    - misspell
  settings:
    gosec:
      # G122 reports false positives for trusted repository walks, and golangci-lint
      # cannot apply inline //#nosec annotations to this check.
      excludes: [G122]
  exclusions:
    rules:
      # Fabrik handler, hook, and directive contracts require otherwise unused
      # parameters.
      - linters:
          - revive
        text: "^(exported|unused-parameter):"

# gci conflicts with gofumpt's import ordering.
formatters:
  enable:
    - gofumpt
    - goimports
