version: "2"

linters:
  default: standard
  enable:
    - gosec
    - gocritic
    - revive
    - misspell
  settings:
    gosec:
      # G122 reports false positives for trusted repository walks, and golangci-lint
      # cannot apply inline //#nosec annotations to this check.
      excludes: [G122]
  exclusions:
    rules:
      # exported and package-comments: doc-comment completeness is deliberately not
      # enforced. unused-parameter: fabrik handler, hook, and directive contracts
      # require otherwise unused parameters. blank-imports: database/sql driver
      # imports are standard and self-explanatory.
      - linters:
          - revive
        text: "^(blank-imports|exported|package-comments|unused-parameter):"

# gci conflicts with gofumpt's import ordering.
formatters:
  enable:
    - gofumpt
    - goimports
